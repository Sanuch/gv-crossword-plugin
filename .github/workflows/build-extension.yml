name: Build Extension

on:
  workflow_dispatch:
    inputs:
      dictionary_manifest_url:
        description: Dictionary manifest URL for build-time injection
        required: false
        type: string
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DICTIONARY_MANIFEST_URL: ${{ github.event.inputs.dictionary_manifest_url || vars.DICTIONARY_MANIFEST_URL }}
    strategy:
      fail-fast: false
      matrix:
        browser:
          - chrome
          - firefox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build extension
        run: npm run build -- --target=${{ matrix.browser }}

      - name: Package extension
        run: npm run package -- --target=${{ matrix.browser }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crossword-${{ matrix.browser }}
          path: dist/crossword-${{ matrix.browser }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: crossword-*
          merge-multiple: true
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.zip
